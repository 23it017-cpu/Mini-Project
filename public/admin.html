<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | NewsKrish</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="admin-sidebar glass" style="border-radius: 0;">
            <div class="logo" style="margin-bottom: 3rem;">NewsKrish Admin</div>
            <nav style="display: flex; flex-direction: column; gap: 1rem;">
                <a href="#" class="category-btn active" style="text-align: left; border-radius: 12px; width: 100%;"><i class="fas fa-chart-line"></i> Dashboard</a>
                <a href="#" class="category-btn" style="text-align: left; border-radius: 12px; width: 100%;"><i class="fas fa-newspaper"></i> News Management</a>
                <a href="#" class="category-btn" style="text-align: left; border-radius: 12px; width: 100%;"><i class="fas fa-users"></i> User Management</a>
                <a href="#" class="category-btn" style="text-align: left; border-radius: 12px; width: 100%;"><i class="fas fa-comments"></i> Comments</a>
                <a href="#" class="category-btn" style="text-align: left; border-radius: 12px; width: 100%;"><i class="fas fa-envelope"></i> Feedback</a>
                <a href="index.html" class="category-btn" style="text-align: left; border-radius: 12px; width: 100%; margin-top: auto;"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>

        <main class="admin-main">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem;">
                <h1>Dashboard Overview</h1>
                <button class="btn-primary" id="btn-create-news"><i class="fas fa-plus"></i> Create News</button>
            </header>

            <!-- Stats Grid -->
            <section class="stats-grid">
                <div class="stat-card glass">
                    <span style="color: var(--text-secondary); font-size: 0.9rem;">Total Articles</span>
                    <h2 id="stat-articles" style="font-size: 2.5rem; margin-top: 0.5rem;">...</h2>
                </div>
                <div class="stat-card glass">
                    <span style="color: var(--text-secondary); font-size: 0.9rem;">Registered Users</span>
                    <h2 id="stat-users" style="font-size: 2.5rem; margin-top: 0.5rem;">Secure</h2>
                </div>
                <div class="stat-card glass">
                    <span style="color: var(--text-secondary); font-size: 0.9rem;">Total Views</span>
                    <h2 id="stat-views" style="font-size: 2.5rem; margin-top: 0.5rem;">...</h2>
                </div>
            </section>

            <!-- News Management Table -->
            <section class="glass" style="padding: 2rem;">
                <h3 style="margin-bottom: 2rem;">Recent News Articles</h3>
                <div style="overflow-x: auto;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>Category</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="admin-table-body">
                            <tr><td colspan="4" style="text-align: center;">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Modal (Hidden by Default) -->
            <div id="news-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;">
                <div class="glass" style="width: 100%; max-width: 600px; padding: 2rem; background: var(--bg-color);">
                    <h2 id="modal-title" style="margin-bottom: 1.5rem;">Create News</h2>
                    <form id="news-form">
                        <input type="hidden" id="news-id">
                        <div class="form-group" style="margin-bottom: 1rem;">
                            <label>Title</label>
                            <input type="text" id="news-title" style="width: 100%; padding: 0.8rem; border-radius: 8px; background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-primary);" required>
                        </div>
                        <div class="form-group" style="margin-bottom: 1rem;">
                            <label>Category</label>
                            <select id="news-category" style="width: 100%; padding: 0.8rem; border-radius: 8px; background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-primary);" required>
                                <option value="technology">Technology</option>
                                <option value="placements">Placements</option>
                                <option value="events">Events</option>
                                <option value="departments">Departments</option>
                                <option value="exams">Exams</option>
                                <option value="sports">Sports</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin-bottom: 1rem;">
                            <label>Image URL</label>
                            <input type="url" id="news-image" style="width: 100%; padding: 0.8rem; border-radius: 8px; background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-primary);" required>
                        </div>
                        <div class="form-group" style="margin-bottom: 1.5rem;">
                            <label>Content</label>
                            <textarea id="news-content" rows="6" style="width: 100%; padding: 0.8rem; border-radius: 8px; background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-primary);" required></textarea>
                        </div>
                        <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                            <button type="button" id="btn-cancel-modal" style="padding: 0.8rem 1.5rem; cursor: pointer; border-radius: 8px; background: var(--card-bg); color: var(--text-primary); border: 1px solid var(--border-color);">Cancel</button>
                            <button type="submit" class="btn-primary" style="padding: 0.8rem 1.5rem;">Save</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Check admin status
            try {
                const res = await fetch('/api/auth/me');
                if (!res.ok) throw new Error();
                const user = await res.json();
                if (user.role !== 'admin') {
                    window.location.href = 'index.html';
                }
            } catch (err) {
                window.location.href = 'auth.html';
            }

            loadTable();
        });

        const tableBody = document.getElementById('admin-table-body');
        const modal = document.getElementById('news-modal');
        const newsForm = document.getElementById('news-form');

        document.getElementById('btn-create-news').onclick = () => {
            newsForm.reset();
            document.getElementById('news-id').value = '';
            document.getElementById('modal-title').innerText = 'Create News';
            modal.style.display = 'flex';
        };

        document.getElementById('btn-cancel-modal').onclick = () => {
            modal.style.display = 'none';
        };

        async function loadTable() {
            try {
                // Fetch articles
                const res = await fetch('/api/news?page=1');
                const data = await res.json();
                const articles = data.articles || [];

                document.getElementById('stat-articles').innerText = data.count || articles.length;
                document.getElementById('stat-views').innerText = articles.reduce((acc, a) => acc + (a.views || 0), 0);

                tableBody.innerHTML = '';
                articles.forEach(article => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${article.title.substring(0, 40)}...</td>
                        <td style="text-transform: capitalize;">${article.category}</td>
                        <td>${new Date(article.createdAt).toLocaleDateString()}</td>
                        <td>
                            <button onclick="editArticle('${article._id}')" style="color: var(--secondary-color); margin-right: 1rem; background: none; border: none; cursor: pointer;"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteArticle('${article._id}')" style="color: #ef4444; background: none; border: none; cursor: pointer;"><i class="fas fa-trash"></i></button>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (err) {
                tableBody.innerHTML = '<tr><td colspan="4">Error loading data</td></tr>';
            }
        }

        window.editArticle = async (id) => {
            const res = await fetch(`/api/news/${id}`);
            const article = await res.json();
            
            document.getElementById('news-id').value = article._id;
            document.getElementById('news-title').value = article.title;
            document.getElementById('news-category').value = article.category;
            document.getElementById('news-image').value = article.image_url;
            document.getElementById('news-content').value = article.content;
            
            document.getElementById('modal-title').innerText = 'Edit News';
            modal.style.display = 'flex';
        };

        window.deleteArticle = async (id) => {
            if (confirm('Are you sure you want to delete this article?')) {
                await fetch(`/api/news/${id}`, { method: 'DELETE' });
                loadTable();
            }
        };

        newsForm.onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('news-id').value;
            
            const payload = {
                title: document.getElementById('news-title').value,
                category: document.getElementById('news-category').value,
                image_url: document.getElementById('news-image').value,
                content: document.getElementById('news-content').value,
            };

            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/news/${id}` : '/api/news';

            await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            modal.style.display = 'none';
            loadTable();
        };
    </script>
</html>
